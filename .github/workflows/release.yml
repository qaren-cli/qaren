name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  validate:
    name: Validate (Test & Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Version Safety Check
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          CARGO_VERSION=$(grep '^version =' qaren-cli/Cargo.toml | head -n 1 | cut -d '"' -f 2)
          echo "Tag version: $TAG_VERSION"
          echo "Cargo version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Error: Git tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Run Tests
        run: cargo test --workspace

      - name: Run Clippy
        run: cargo clippy --workspace -- -D warnings

  publish:
    name: Publish to crates.io
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish qaren-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cd qaren-core && cargo publish --no-verify --allow-dirty

      - name: Publish qaren-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cd qaren-cli && cargo publish --no-verify --allow-dirty

  build-release:
    name: Build and Release
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: qaren
            asset_name: qaren-linux-amd64.tar.gz
            use_cross: false

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: qaren
            asset_name: qaren-fedora-amd64.tar.gz
            use_cross: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: qaren
            asset_name: qaren-linux-arm64.tar.gz
            use_cross: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: qaren
            asset_name: qaren-fedora-arm64.tar.gz
            use_cross: true

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: qaren
            asset_name: qaren-macos-intel.tar.gz
            use_cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: qaren
            asset_name: qaren-macos-silicon.tar.gz
            use_cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: qaren.exe
            asset_name: qaren-windows-amd64.zip
            use_cross: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Install cargo-deb and cargo-generate-rpm
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm
        shell: bash

      - name: Build Binary
        run: |
          if [ "${{ matrix.use_cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Build DEB and RPM
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cd qaren-cli
          cargo deb --target x86_64-unknown-linux-gnu --no-build
          cargo generate-rpm --target x86_64-unknown-linux-gnu
          mv target/x86_64-unknown-linux-gnu/debian/*.deb ../qaren-amd64.deb
          mv target/generate-rpm/*.rpm ../qaren-amd64.rpm
          cd ..
        shell: bash

      - name: Package Release (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          cd ../../..

      - name: Package Release (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.artifact_name }} -DestinationPath ../../../${{ matrix.asset_name }}
          cd ../../..
        shell: powershell

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}
            *.deb
            *.rpm
          generate_release_notes: true
          overwrite_files: true
